<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:image" content="{% if page.og_image %}{{ site.url }}{{ site.baseurl }}/{{ page.og_image }}{% else %}{{ site.url }}{{ site.baseurl }}/images/og-image.jpg{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ site.title }}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}">
  <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="twitter:image" content="{% if page.og_image %}{{ site.url }}{{ site.baseurl }}/{{ page.og_image }}{% else %}{{ site.url }}{{ site.baseurl }}/images/og-image.jpg{% endif %}">

  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="{{ '/images/logo.webp' | relative_url }}">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">

  <!-- LocalBusiness Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "name": "{{ site.data.site.company_name }}",
    "description": "{{ site.description }}",
    "url": "{{ site.url }}{{ site.baseurl }}",
    "telephone": "{{ site.data.site.phone }}",
    "image": "{{ site.url }}{{ site.baseurl }}/images/og-image.jpg",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Harford County",
      "addressRegion": "MD",
      "addressCountry": "US"
    },
    "areaServed": [
      { "@type": "State", "name": "Maryland" },
      { "@type": "State", "name": "Virginia" },
      { "@type": "State", "name": "Delaware" },
      { "@type": "State", "name": "Pennsylvania" }
    ],
    "serviceType": ["Hydraulic Dredging", "Aquatic Vegetation Harvesting", "Waterway Restoration", "Sediment Removal", "Shoreline Cutting", "Bush Hog Mowing"]
  }
  </script>

  {{ page.extra_head }}
</head>
